name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux + Windows (cross-compile) — ubuntu-latest
  # ---------------------------------------------------------------------------
  build-linux-windows:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build zip \
            libsdl2-dev libsdl2-ttf-dev libsdl2-mixer-dev \
            g++-mingw-w64-x86-64 mingw-w64

      - name: Fetch Windows SDL2 packages
        run: |
          mkdir -p deps/windows && cd deps/windows
          wget -q "https://github.com/libsdl-org/SDL/releases/download/release-2.32.4/SDL2-devel-2.32.4-mingw.tar.gz" -O SDL2-mingw.tar.gz
          wget -q "https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.24.0/SDL2_ttf-devel-2.24.0-mingw.tar.gz" -O SDL2_ttf-mingw.tar.gz
          wget -q "https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.1/SDL2_mixer-devel-2.8.1-mingw.tar.gz" -O SDL2_mixer-mingw.tar.gz
          tar xf SDL2-mingw.tar.gz
          tar xf SDL2_ttf-mingw.tar.gz
          tar xf SDL2_mixer-mingw.tar.gz

      - name: Check Steamworks SDK availability
        id: steam
        env:
          SDK_URL: ${{ secrets.STEAMWORKS_SDK_URL }}
        run: |
          if [ -n "$SDK_URL" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "flag=-DUSE_STEAM=ON" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "flag=-DUSE_STEAM=OFF" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Steamworks SDK
        if: steps.steam.outputs.available == 'true'
        env:
          STEAMWORKS_SDK_URL: ${{ secrets.STEAMWORKS_SDK_URL }}
        run: |
          curl -sL "$STEAMWORKS_SDK_URL" -o steamworks_sdk.zip
          unzip -q steamworks_sdk.zip -d steamworks_tmp
          mkdir -p deps/steamworks/lib
          mv steamworks_tmp/sdk/public                      deps/steamworks/public
          mv steamworks_tmp/sdk/redistributable_bin/linux64 deps/steamworks/lib/linux64
          mv steamworks_tmp/sdk/redistributable_bin/win64   deps/steamworks/lib/win64
          rm -rf steamworks_tmp steamworks_sdk.zip

      - name: Build Linux
        run: |
          cmake -S . -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            ${{ steps.steam.outputs.flag }}
          cmake --build build-linux --parallel $(nproc)

      - name: Package Linux
        run: |
          TAG="${GITHUB_REF_NAME}"
          DIR="dist/dead-sector-linux-${TAG}"
          mkdir -p "$DIR"
          cp build-linux/dead-sector "$DIR/"
          cp -r build-linux/assets   "$DIR/"
          [ -f build-linux/libsteam_api.so ] && cp build-linux/libsteam_api.so "$DIR/"
          cd dist && zip -r "dead-sector-linux-${TAG}.zip" "dead-sector-linux-${TAG}/"

      - name: Build Windows
        run: |
          cmake -S . -B build-windows -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-mingw64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            ${{ steps.steam.outputs.flag }}
          cmake --build build-windows --parallel $(nproc)

      - name: Package Windows
        run: |
          TAG="${GITHUB_REF_NAME}"
          DIR="dist/dead-sector-windows-${TAG}"
          mkdir -p "$DIR"
          cp build-windows/dead-sector.exe "$DIR/"
          cp build-windows/SDL2.dll        "$DIR/"
          cp build-windows/SDL2_mixer.dll  "$DIR/"
          cp build-windows/SDL2_ttf.dll    "$DIR/"
          cp build-windows/libwinpthread-1.dll "$DIR/"
          cp -r build-windows/assets       "$DIR/"
          [ -f build-windows/steam_api64.dll ] && cp build-windows/steam_api64.dll "$DIR/"
          cd dist && zip -r "dead-sector-windows-${TAG}.zip" "dead-sector-windows-${TAG}/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-windows-artifacts
          path: dist/*.zip

  # ---------------------------------------------------------------------------
  # macOS — native build
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja sdl2 sdl2_ttf sdl2_mixer

      - name: Check Steamworks SDK availability
        id: steam
        env:
          SDK_URL: ${{ secrets.STEAMWORKS_SDK_URL }}
        run: |
          if [ -n "$SDK_URL" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "flag=-DUSE_STEAM=ON" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "flag=-DUSE_STEAM=OFF" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Steamworks SDK
        if: steps.steam.outputs.available == 'true'
        env:
          STEAMWORKS_SDK_URL: ${{ secrets.STEAMWORKS_SDK_URL }}
        run: |
          curl -sL "$STEAMWORKS_SDK_URL" -o steamworks_sdk.zip
          unzip -q steamworks_sdk.zip -d steamworks_tmp
          mkdir -p deps/steamworks/lib
          mv steamworks_tmp/sdk/public                      deps/steamworks/public
          mv steamworks_tmp/sdk/redistributable_bin/osx     deps/steamworks/lib/osx
          rm -rf steamworks_tmp steamworks_sdk.zip

      - name: Build macOS
        run: |
          cmake -S . -B build-macos -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)" \
            ${{ steps.steam.outputs.flag }}
          cmake --build build-macos --parallel $(sysctl -n hw.logicalcpu)

      - name: Package macOS
        run: |
          TAG="${GITHUB_REF_NAME}"
          DIR="dist/dead-sector-macos-${TAG}"
          mkdir -p "$DIR"
          cp build-macos/dead-sector "$DIR/"
          cp -r build-macos/assets   "$DIR/"
          BREW_LIB="$(brew --prefix)/lib"
          for lib in libSDL2-2.0.0.dylib libSDL2_ttf-2.0.0.dylib libSDL2_mixer-2.0.0.dylib; do
            [ -f "$BREW_LIB/$lib" ] || continue
            cp "$BREW_LIB/$lib" "$DIR/"
            install_name_tool -change \
              "$(otool -D "$BREW_LIB/$lib" | tail -1)" \
              "@executable_path/$lib" \
              "$DIR/dead-sector" 2>/dev/null || true
          done
          cd dist && zip -r "dead-sector-macos-${TAG}.zip" "dead-sector-macos-${TAG}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist/dead-sector-macos-*.zip

  # ---------------------------------------------------------------------------
  # Publish GitHub Release
  # ---------------------------------------------------------------------------
  release:
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Dead Sector ${{ github.ref_name }}"
          body: |
            ## Dead Sector ${{ github.ref_name }}

            | Platform | File | Notes |
            |---|---|---|
            | Windows (x64) | `dead-sector-windows-${{ github.ref_name }}.zip` | Extract and run `dead-sector.exe` |
            | Linux (x64)   | `dead-sector-linux-${{ github.ref_name }}.zip`   | Requires `libsdl2-2.0-0 libsdl2-ttf-2.0-0 libsdl2-mixer-2.0-0` |
            | macOS         | `dead-sector-macos-${{ github.ref_name }}.zip`   | SDL2 bundled — right-click → Open on first launch |
          files: release-files/**
          draft: false
          prerelease: false
